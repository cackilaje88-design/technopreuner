<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTA'45 Digital Booth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="https://www.uta45jakarta.ac.id/wp-content/uploads/2024/12/logo-uta-Merah-bergandengan2022-e1733890635575.png" width="70">
        <h2>E-Book Gratis</h2>
        <form id="promoForm">
            <input type="text" name="Nama" placeholder="Nama Lengkap" required>
            <input type="number" name="WhatsApp" placeholder="No WhatsApp (Contoh: 0812...)" required>
            <input type="text" name="Asal_Sekolah" placeholder="Asal Sekolah" required>
            <button type="submit" id="btnSubmit">DAPATKAN SEKARANG</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
